<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mis Finanzas 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#B47FDE;--purple-light:#F0E6FF;--purple-mid:#C9A0DC;--green:#77DD77;--green-dark:#2A7050;--red:#FF6B6B;--red-dark:#A03030;--text:#3A3040;--muted:#9A8AAA;--border:#E8D5FF;--bg:#FDF6FF;--card:#FFF;--bnav-h:60px;--safe-bot:env(safe-area-inset-bottom,0px)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:'Nunito',sans-serif;font-size:1rem}
button{cursor:pointer;border:none;background:none}
input{outline:none}

/* ── Layout mobile ── */
#app{display:flex;flex-direction:column;min-height:100vh;max-width:520px;margin:0 auto}
#content{flex:1;overflow-y:auto;padding-bottom:calc(var(--bnav-h) + var(--safe-bot) + 8px)}
.view{padding:1.2rem 1rem .5rem;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── Bottom nav (mobile) ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#fff;border-top:2px solid var(--border);display:flex;padding:.35rem 0;padding-bottom:calc(.35rem + var(--safe-bot));z-index:100;box-shadow:0 -4px 20px rgba(180,127,222,.15)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:.3rem 0;color:#C0B0D0;min-height:44px;justify-content:center}
.ni.active{color:var(--purple)}
.ni .ico{font-size:1.3rem;line-height:1}
.ni .lbl{font-size:.58rem;font-weight:700;letter-spacing:.2px}

/* ── Desktop ── */
@media(min-width:768px){
  body{background:linear-gradient(135deg,#F5EEFF 0%,#EAF6FF 50%,#EDFAF5 100%);min-height:100vh}
  #app{flex-direction:row;max-width:1100px;min-height:100vh;margin:0 auto;background:none}
  .bnav{position:fixed;left:max(0px,calc(50vw - 550px));top:0;bottom:auto;width:200px;max-width:200px;height:100vh;flex-direction:column;border-top:none;border-right:2px solid var(--border);background:#fff;padding:2rem 0 1rem;box-shadow:4px 0 20px rgba(180,127,222,.08);align-items:stretch;justify-content:flex-start;gap:.2rem;transform:none}
  .bnav::before{content:"mis finanzas 💜";font-family:"Lora",serif;font-size:1.05rem;font-weight:700;color:var(--text);padding:0 1.4rem 1.5rem;display:block;border-bottom:2px solid var(--border);margin-bottom:.5rem}
  .ni{flex:none;flex-direction:row;justify-content:flex-start;gap:.75rem;padding:.7rem 1.4rem;border-radius:0;min-height:48px}
  .ni.active{background:var(--purple-light);color:var(--purple);position:relative}
  .ni.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--purple);border-radius:0 3px 3px 0}
  .ni .ico{font-size:1.2rem;flex-shrink:0}
  .ni .lbl{font-size:.88rem;font-weight:700;letter-spacing:0}
  #content{margin-left:200px;padding-bottom:2rem;min-height:100vh;background:transparent}
  .view{max-width:760px;padding:2rem 2.5rem}
  .cgrid{grid-template-columns:1fr 1fr 1fr}
  .hero{border-radius:24px;padding:2rem}
  .hero-bal{font-size:3.2rem}
  .page-title{font-size:1.8rem}
  .sec-title{font-size:1.25rem}
  .inc-card,.move-card{padding:.95rem 1.1rem}
}

/* ── Loading / Setup overlays ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:1rem}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#setup{position:fixed;inset:0;background:var(--bg);z-index:998;overflow-y:auto;padding:2rem 1.2rem}

/* ── Typography ── */
.page-title{font-family:'Lora',serif;font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:1.1rem}
.sec-title{font-family:'Lora',serif;font-size:1.1rem;font-weight:700;margin-bottom:.7rem}
.sub{font-size:.78rem;color:var(--muted);line-height:1.5}
.empty{font-size:.85rem;color:#C0B0D0;text-align:center;padding:2rem 1rem}

/* ── Month strip ── */
.mstrip{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.mname{font-family:'Lora',serif;font-size:1.4rem;font-weight:700}
.myear{color:var(--muted);font-weight:600}
.arrbtn{background:var(--purple-light);color:#8B5BAE;width:36px;height:36px;border-radius:50%;font-size:1rem;font-weight:800;display:flex;align-items:center;justify-content:center;min-height:44px;min-width:44px}
.arrbtn:active{background:#E0D0F8}

/* ── Hero card ── */
.hero{background:linear-gradient(135deg,#E8D5FF,#C9E8FF 50%,#D5F0E8);border-radius:20px;padding:1.4rem;margin-bottom:1.3rem;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;top:-30px;right:-30px;width:110px;height:110px;background:rgba(255,255,255,.25);border-radius:50%}
.hero-eye{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#7A6A90;margin-bottom:.35rem}
.hero-bal{font-family:'Lora',serif;font-size:2.6rem;font-weight:700;letter-spacing:-.5px;margin-bottom:1rem}
.hero-bal.pos{color:#2A5040}.hero-bal.neg{color:var(--red-dark)}
.hero-row{display:flex;background:rgba(255,255,255,.5);border-radius:12px;padding:.6rem}
.hero-half{display:flex;flex-direction:column;flex:1;align-items:center;gap:2px}
.hh-lbl{font-size:.68rem;font-weight:700;color:#7A6A90}
.hh-val{font-size:.9rem;font-weight:800}
.inc-val{color:var(--green-dark)}.exp-val{color:var(--red-dark)}
.hero-div{width:1px;background:rgba(255,255,255,.6);margin:0 .5rem}
.pusheen{position:absolute;bottom:0;right:8px;width:72px;pointer-events:none;z-index:2}
.pusheen svg{display:block;animation:catbob 3s ease-in-out infinite;filter:drop-shadow(0 2px 4px rgba(150,120,180,.2))}
@keyframes catbob{0%,100%{transform:translateY(0) rotate(0deg)}40%{transform:translateY(-5px) rotate(-1deg)}60%{transform:translateY(-3px) rotate(1deg)}}

/* ── Alert ── */
.alert-box{display:flex;gap:.6rem;background:#FFF9E0;border:2px solid #FFE066;border-radius:12px;padding:.75rem;margin-bottom:1rem;font-size:.8rem}
.al-row{color:#7A6A00;margin-top:2px}

/* ── Buttons ── */
.pill-btn{background:var(--purple-light);border-radius:20px;padding:.4rem .9rem;font-size:.75rem;font-weight:700;color:#8B5BAE;min-height:36px}
.pill-btn:active{background:#E0D0F8}
.pill-btn.g{background:#D5F0E0;color:var(--green-dark)}
.pill-btn.r{background:#FFE8E8;color:var(--red-dark)}
.save-btn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--purple-mid),#87CEEB);color:#fff;border-radius:12px;font-size:1rem;font-weight:800;min-height:48px}
.save-btn:active{opacity:.88}
.save-btn.ok{background:linear-gradient(135deg,var(--green),#7EC8C8)!important}
.save-btn.sb{background:linear-gradient(135deg,#5BC0EB,#7EC8C8)!important}
.ghost-btn{background:none;border:2px solid var(--border);border-radius:10px;padding:.6rem 1rem;font-size:.85rem;font-weight:700;color:var(--muted)}

/* ── Category cards ── */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
@media(max-width:340px){.cgrid{grid-template-columns:1fr}}
.ctile{border-radius:14px;padding:.85rem;border:2px solid transparent;position:relative}
.ct-top{display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem}
.ct-emoji{font-size:1rem}.ct-name{font-size:.7rem;font-weight:700;color:#6A5A7A;line-height:1.2;flex:1}
.ct-spent{font-family:'Lora',serif;font-size:1rem;font-weight:700;margin-bottom:.3rem}
.ct-sub{font-size:.63rem;color:var(--muted);font-weight:600;margin-bottom:.3rem}
.ct-track{height:4px;background:rgba(0,0,0,.1);border-radius:2px;overflow:hidden;margin-bottom:.25rem}
.ct-fill{height:100%;border-radius:2px;transition:width .5s ease}
.ct-rem{font-size:.65rem;font-weight:700}
.ct-rem.ok{color:var(--green-dark)}.ct-rem.warn{color:#E07A00}.ct-rem.over{color:var(--red-dark)}
.freq-badge{position:absolute;top:.6rem;right:.6rem;font-size:.55rem;font-weight:800;padding:.1rem .35rem;border-radius:8px;text-transform:uppercase;letter-spacing:.3px}
.freq-w{background:#E8F0FF;color:#5070C0}
.freq-m{background:#F0F8E8;color:#508040}

/* ── Form fields ── */
.field{margin-bottom:.9rem}
.flbl{display:block;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.35rem}
.txt-inp{width:100%;background:#FFF;border:2px solid var(--border);border-radius:10px;padding:.7rem .85rem;color:var(--text);font-size:.9rem;font-weight:600;min-height:44px}
.txt-inp:focus{border-color:var(--purple)}
.amt-wrap{display:flex;align-items:center;background:#FFF;border:2px solid var(--border);border-radius:10px;overflow:hidden}
.amt-sign{padding:0 .85rem;font-size:.95rem;font-weight:700;color:var(--muted);background:#F5EEFF;border-right:2px solid var(--border);align-self:stretch;display:flex;align-items:center}
.amt-inp{flex:1;background:none;border:none;padding:.7rem .8rem;color:var(--text);font-family:'Lora',serif;font-size:1.5rem;font-weight:700;min-height:48px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.seg{display:flex;background:#F5EEFF;border-radius:10px;padding:3px;gap:3px;margin-bottom:1rem}
.seg-btn{flex:1;padding:.55rem;border-radius:8px;font-size:.82rem;font-weight:700;color:var(--muted);min-height:36px}
.seg-btn.on{background:#FFF;color:var(--purple);box-shadow:0 1px 4px rgba(180,127,222,.2)}

/* ── Income list ── */
.inc-list,.move-list{display:flex;flex-direction:column;gap:.45rem}
.inc-card,.move-card{background:#FFF;border-radius:11px;padding:.8rem;display:flex;align-items:center;gap:.7rem;border-left:4px solid;box-shadow:0 2px 8px rgba(180,127,222,.07)}
.inc-card{border-left-color:var(--green)}
.card-icon{font-size:1.1rem;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-desc{font-size:.87rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:.68rem;color:var(--muted);margin-top:1px;font-weight:600}
.card-amt{font-family:'Lora',serif;font-size:1rem;font-weight:700;white-space:nowrap}
.del-x{color:#D0C0E0;font-size:1rem;font-weight:700;padding:.2rem .4rem;min-height:36px;min-width:36px;display:flex;align-items:center;justify-content:center}
.del-x:active{color:var(--red-dark)}
.total-row{display:flex;justify-content:space-between;align-items:center;background:#E8F8EE;border-radius:10px;padding:.7rem .9rem;margin-bottom:.9rem;font-size:.82rem;font-weight:700}

/* ── Category picker ── */
.cat-picker{display:flex;flex-wrap:wrap;gap:.4rem}
.cp-btn{padding:.32rem .7rem;border-radius:20px;border:2px solid;background:#FFF;font-size:.72rem;font-weight:700;color:#5A4A6A;min-height:36px}
.cp-btn.on{color:#333}

/* ── Chips (moves filter) ── */
.chip-row{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.4rem;margin-bottom:.8rem;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:.32rem .8rem;border-radius:20px;border:2px solid var(--border);background:#FFF;font-size:.72rem;font-weight:700;color:var(--muted);min-height:36px}
.chip.on{background:var(--purple-light);border-color:var(--purple);color:#8B5BAE}

/* ── Projected ── */
.proj-card{background:#FFF;border:2px solid var(--border);border-radius:12px;padding:.9rem;margin-bottom:.5rem}
.proj-card.now{border-color:#FFE066;background:#FFFBE8}
.proj-card.past{opacity:.55}
.proj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem}
.ptag{display:inline-block;padding:.12rem .55rem;border-radius:10px;font-size:.67rem;font-weight:800;margin-bottom:.45rem}
.ptag.now{background:#FFF3CC;color:#A08000}
.ptag.future{background:#E8F5E8;color:var(--green-dark)}
.ptag.done{background:#F0F0F0;color:var(--muted)}
.proj-btns{display:flex;gap:.4rem}
.pb{padding:.28rem .7rem;border-radius:20px;border:2px solid;background:#FFF;font-size:.72rem;font-weight:700;min-height:36px}
.pb.g{border-color:var(--green);color:var(--green-dark)}
.pb.r{border-color:var(--red);color:var(--red-dark)}

/* ── Settings ── */
.set-sec{margin-bottom:1.4rem}
.set-sec-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.6rem}
.cat-set-row{display:flex;align-items:center;gap:.6rem;background:#FFF;border:2px solid var(--border);border-left:5px solid;border-radius:11px;padding:.65rem .9rem;margin-bottom:.45rem}
.emoji-inp{width:38px;text-align:center;border:2px solid var(--border);border-radius:7px;padding:.3rem;font-size:1rem;flex-shrink:0;background:#FBF5FF;min-height:36px}
.emoji-inp:focus{border-color:var(--purple)}
.name-inp{flex:1;background:none;border:none;border-bottom:2px solid var(--border);color:var(--text);font-size:.88rem;font-weight:700;padding:.2rem .1rem;min-height:36px}
.name-inp:focus{border-bottom-color:var(--purple)}
.bud-inp{width:90px;background:#FBF5FF;border:2px solid var(--border);border-radius:7px;padding:.3rem .5rem;font-size:.8rem;font-weight:700;color:var(--text);min-height:36px}
.bud-inp:focus{border-color:var(--purple)}
.emoji-picker{position:absolute;z-index:200;background:#FFF;border:2px solid var(--border);border-radius:14px;padding:.6rem;box-shadow:0 8px 24px rgba(180,127,222,.2);display:grid;grid-template-columns:repeat(8,1fr);gap:2px;width:260px;max-height:200px;overflow-y:auto}
.emoji-picker button{font-size:1.2rem;padding:.3rem;border-radius:7px;border:none;background:none;cursor:pointer;line-height:1}
.emoji-picker button:hover{background:var(--purple-light)}
.fondo-card{background:#FFF;border-radius:14px;padding:1rem 1.1rem;border:2px solid var(--border);margin-bottom:.6rem;cursor:pointer;transition:all .2s}
.fondo-card:hover{border-color:var(--purple);box-shadow:0 4px 12px rgba(180,127,222,.15)}
.fondo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.fondo-name{font-size:1rem;font-weight:800;color:var(--text)}
.fondo-total{font-family:'Lora',serif;font-size:1.3rem;font-weight:700}
.fondo-meta{font-size:.72rem;color:var(--muted);font-weight:600;margin-bottom:.5rem}
.fondo-track{height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden;margin-bottom:.6rem}
.fondo-fill{height:100%;border-radius:3px;transition:width .6s ease}
.fondo-history{border-top:2px solid var(--border);padding-top:.7rem;margin-top:.2rem;display:none}
.fondo-history.open{display:block}
.fondo-hist-row{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0;border-bottom:1px solid #F0E6FF;font-size:.8rem}
.fondo-hist-row:last-child{border-bottom:none}
.fondo-add-form{background:#F5EEFF;border-radius:10px;padding:.7rem;margin-top:.6rem}
.fondos-global{display:flex;align-items:center;gap:.75rem;background:linear-gradient(135deg,#E8D5FF,#D5F0E8);border-radius:14px;padding:1rem 1.2rem;margin-bottom:1.2rem;cursor:pointer}
.fondos-global:hover{opacity:.9}
.fixed-card{background:#FFF;border-radius:12px;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;border-left:4px solid var(--border);box-shadow:0 2px 8px rgba(180,127,222,.07);margin-bottom:.45rem;position:relative;transition:all .2s}
.fixed-card.paid{background:#F0FFF4;border-left-color:#77DD77}
.fixed-card.paid .fc-name{text-decoration:line-through;color:var(--muted)}
.fc-info{flex:1;min-width:0}
.fc-name{font-size:.88rem;font-weight:700;color:var(--text)}
.fc-amt{font-family:'Lora',serif;font-size:1rem;font-weight:700;color:var(--text);white-space:nowrap}
.fc-meta{font-size:.68rem;color:var(--muted);margin-top:1px}
.pay-btn{padding:.4rem .8rem;border-radius:20px;border:2px solid;font-size:.75rem;font-weight:800;min-height:36px;transition:all .2s}
.pay-btn.unpaid{border-color:var(--border);color:var(--muted);background:#FFF}
.pay-btn.unpaid:hover{border-color:#FF6B6B;color:#FF6B6B}
.pay-btn.paid{border-color:#77DD77;color:var(--green-dark);background:#F0FFF4}
.paid-stamp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
.paid-stamp.show{opacity:1}
.paid-stamp span{font-size:3rem;transform:rotate(-15deg);filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.week-card{background:#FFF;border-radius:12px;padding:.8rem 1rem;margin-bottom:.5rem;border:2px solid var(--border)}
.week-card.current{border-color:var(--purple);background:var(--purple-light)}
.week-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.week-title{font-size:.82rem;font-weight:800;color:var(--text)}
.week-badge{font-size:.7rem;font-weight:800;padding:.15rem .5rem;border-radius:10px}
.week-surplus{background:#E8F8EE;color:var(--green-dark)}
.week-deficit{background:#FFEAEA;color:var(--red-dark)}
.week-neutral{background:#F5EEFF;color:var(--purple)}
.week-bar-wrap{height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden;margin:.4rem 0}
.week-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.week-detail{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);font-weight:600}
.subitem-list{margin:.4rem 0 .4rem 1.2rem;display:flex;flex-direction:column;gap:.35rem}
.subitem-row{display:flex;align-items:center;gap:.5rem;background:#FAF5FF;border:1.5px solid var(--border);border-radius:8px;padding:.4rem .7rem}
.subitem-name{flex:1;background:none;border:none;border-bottom:1.5px solid var(--border);font-size:.82rem;font-weight:600;color:var(--text);padding:.1rem .1rem;min-height:30px}
.subitem-name:focus{outline:none;border-bottom-color:var(--purple)}
.subitem-amt{width:80px;background:#FFF;border:1.5px solid var(--border);border-radius:6px;padding:.25rem .4rem;font-size:.78rem;font-weight:700;color:var(--text);min-height:30px}
.subitem-amt:focus{outline:none;border-color:var(--purple)}
.subitem-del{color:#D0C0E0;font-size:.85rem;font-weight:700;min-width:24px;min-height:30px;display:flex;align-items:center;justify-content:center}
.subitem-del:hover{color:var(--red-dark)}
.add-subitem-btn{font-size:.72rem;font-weight:700;color:var(--purple);background:var(--purple-light);border:none;border-radius:7px;padding:.3rem .7rem;margin-top:.3rem;margin-left:1.2rem;min-height:30px}
.sb-input{width:100%;background:#FFF;border:2px solid var(--border);border-radius:10px;padding:.7rem .85rem;color:var(--text);font-size:.82rem;font-weight:600;margin-bottom:.6rem;min-height:44px}
.sb-input:focus{border-color:var(--purple)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.4rem}
.status-ok{background:#77DD77}.status-err{background:#FF6B6B}.status-none{background:#D0C0E0}
code{background:#F0E6FF;padding:.1rem .4rem;border-radius:4px;font-size:.78rem;color:#6030A0;display:block;margin:.3rem 0;word-break:break-all;font-family:monospace;line-height:1.6}
.sql-box{background:#1E1E2E;color:#CDD6F4;padding:1rem;border-radius:12px;margin:.6rem 0;font-family:monospace;font-size:.75rem;line-height:1.7;overflow-x:auto;white-space:pre}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span style="font-size:.85rem;color:var(--muted);font-weight:600">Cargando...</span>
</div>

<div id="app" style="display:none">
  <div id="content"></div>
  <nav class="bnav">
    <button class="ni active" data-view="home"><span class="ico">🏠</span><span class="lbl">Inicio</span></button>
    <button class="ni" data-view="income"><span class="ico">💰</span><span class="lbl">Ingresos</span></button>
    <button class="ni" data-view="expenses"><span class="ico">🛍️</span><span class="lbl">Gastos</span></button>

<script>
'use strict';

// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const CAT_PALETTES = [
  {color:'#FFB347',bg:'#FFF4E0'},{color:'#77DD77',bg:'#EDFAED'},{color:'#FF9AA2',bg:'#FFF0F1'},
  {color:'#87CEEB',bg:'#EAF6FF'},{color:'#C9A0DC',bg:'#F5EEFF'},{color:'#7EC8C8',bg:'#E8FAFA'},
  {color:'#F9C74F',bg:'#FDFDE8'},{color:'#B5EAD7',bg:'#EDFAF5'},{color:'#AEC6CF',bg:'#EAF3F6'},
  {color:'#D4C5F9',bg:'#F5F0FF'},{color:'#FF6B6B',bg:'#FFEAEA'},{color:'#95D5B2',bg:'#E8F8EE'},
];

const DEFAULT_CATS = [
  {id:'alimentacion',name:'Alimentación',  icon:'🛒',color:'#FFB347',bg:'#FFF4E0',freq:'semanal', budget:70000},
  {id:'hogar',       name:'Hogar',         icon:'🏠',color:'#77DD77',bg:'#EDFAED',freq:'mensual', budget:0},
  {id:'salud',       name:'Salud',         icon:'🏥',color:'#FF6B6B',bg:'#FFEAEA',freq:'mensual', budget:0},
  {id:'camilo',      name:'Salud Camilo',  icon:'👦',color:'#FF9AA2',bg:'#FFF0F1',freq:'mensual', budget:0},
  {id:'transporte',  name:'Transporte',    icon:'🚌',color:'#87CEEB',bg:'#EAF6FF',freq:'semanal', budget:0},
  {id:'deudas',      name:'Deudas',        icon:'💳',color:'#C9A0DC',bg:'#F5EEFF',freq:'mensual', budget:0},
  {id:'educacion',   name:'Educación',     icon:'📚',color:'#7EC8C8',bg:'#E8FAFA',freq:'mensual', budget:0},
  {id:'mascota',     name:'Mascota',       icon:'🐕',color:'#F9C74F',bg:'#FDFDE8',freq:'mensual', budget:0},
  {id:'aseo',        name:'Aseo/Farmacia', icon:'🧴',color:'#B5EAD7',bg:'#EDFAF5',freq:'mensual', budget:0},
  {id:'ahorro',      name:'Fondo/Ahorro',  icon:'🏦',color:'#AEC6CF',bg:'#EAF3F6',freq:'mensual', budget:0},
  {id:'otros',       name:'Otros',         icon:'📦',color:'#D4C5F9',bg:'#F5F0FF',freq:'mensual', budget:0},
];

// ═══════════════════════════════════════════════
// SESSION & CONFIG
// ═══════════════════════════════════════════════
function SESSION_ID() {
  return 'francoiro_finanzas';
}

let SB_URL = localStorage.getItem('mf_sb_url') || 'https://kyikjnvzpaigtmrsjkuy.supabase.co';
let SB_KEY = localStorage.getItem('mf_sb_key') || '';
let SB_STATUS = 'none'; // 'none' | 'ok' | 'error'

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const S = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  view: 'home',
  addExpCat: null,
  moveFilter: 'all',
  projForm: false,
  data: {
    cats: DEFAULT_CATS.map(c => ({...c})),
    months: {},
    projected: []
  }
};

// ═══════════════════════════════════════════════
// DATA ACCESSORS
// ═══════════════════════════════════════════════
function mk() { return S.year + '-' + String(S.month + 1).padStart(2,'0'); }

function mdata() {
  if (!S.data.months[mk()]) S.data.months[mk()] = {income:[], expenses:[]};
  return S.data.months[mk()];
}

function getCat(id) {
  return S.data.cats.find(c => c.id === id) || {icon:'📦',name:'Otro',color:'#D4C5F9',bg:'#F5F0FF',freq:'mensual',budget:0};
}

function totalIncome()   { return mdata().income.reduce((s,i) => s + i.amount, 0); }
function totalExpenses() { return mdata().expenses.reduce((s,e) => s + e.amount, 0); }

function catMonthExpenses(catId) {
  return mdata().expenses.filter(e => e.category === catId).reduce((s,e) => s + e.amount, 0);
}

function catWeekExpenses(catId) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1)); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  const mds = mon.toISOString().split('T')[0];
  const sds = sun.toISOString().split('T')[0];
  return mdata().expenses
    .filter(e => e.category === catId && e.date >= mds && e.date <= sds)
    .reduce((s,e) => s + e.amount, 0);
}

// ═══════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════
function saveLocal() {
  localStorage.setItem('mf_data', JSON.stringify(S.data));
}

async function saveSB() {
  if (!SB_URL || !SB_KEY) return;
  try {
    const r = await fetch(SB_URL + '/rest/v1/mf_finanzas', {
      method: 'POST',
      headers: {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify({session_id: SESSION_ID(), data: S.data, updated_at: new Date().toISOString()})
    });
    SB_STATUS = r.ok ? 'ok' : 'error';
  } catch { SB_STATUS = 'error'; }
}

async function save() {
  saveLocal();
  saveSB();
}

async function loadData() {
  if (SB_URL && SB_KEY) {
    try {
      const r = await fetch(SB_URL + '/rest/v1/mf_finanzas?session_id=eq.' + SESSION_ID() + '&select=data', {
        headers: {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
      });
      if (r.ok) {
        const rows = await r.json();
        if (rows && rows[0] && rows[0].data) {
          S.data = rows[0].data;
          saveLocal();
          SB_STATUS = 'ok';
          return;
        }
      }
    } catch { SB_STATUS = 'error'; }
  }
  const local = localStorage.getItem('mf_data');
  if (local) { try { S.data = JSON.parse(local); } catch {} }
}

// ═══════════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════════
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs || {})) {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'cn') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of (children || [])) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else if (c instanceof Node) e.appendChild(c);
  }
  return e;
}
const div = (a,c) => el('div',a,c);
const btn = (a,c) => el('button',a,c);
const inp = a => el('input',a);
const sp  = (cn,t) => { const s=document.createElement('span'); s.className=cn; s.textContent=t; return s; };
const h2e = (a,c) => el('h2',a,c);
const pe  = (a,c) => el('p',a,c);
const fmt = n => '$' + Math.abs(Math.round(n)).toLocaleString('es-CL');

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function go(view) {
  S.view = view;
  document.querySelectorAll('.ni').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  render();
}

// ═══════════════════════════════════════════════
// MAIN RENDER DISPATCHER
// ═══════════════════════════════════════════════
function render() {
  const c = document.getElementById('content');
  c.innerHTML = '';
  ({home:rHome, income:rIncome, expenses:rExpenses, fixed:rFixed, fondos:rFondos, projected:rProjected, settings:rSettings})[S.view]?.(c);
}

// ═══════════════════════════════════════════════
// HOME VIEW

  const cat = div({style:{width:'72px'},html:`<svg viewBox="0 0 78 72" xmlns="http://www.w3.org/2000/svg">

  <polygon points="51,14 57,2 45,9" fill="#D0D0D0"/>

  <path d="M26,25 Q29,22 32,25" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round"/>

    catZone.appendChild(cat);

// INCOME VIEW
// ═══════════════════════════════════════════════
function rIncome(c) {
  const root = div({cn:'view'});
  c.appendChild(root);

  root.appendChild(h2e({cn:'page-title'},['Ingresos']));

  // Total this month
  const total = totalIncome();
  const tr = div({cn:'total-row'});
  tr.appendChild(el('span',{},['Total ' + MONTHS[S.month]]));
  tr.appendChild(el('span',{style:{color:'var(--green-dark)',fontFamily:"'Lora',serif",fontSize:'1.1rem'}},[fmt(total)]));
  root.appendChild(tr);

  // Add income form
  const form = div({cn:'',style:{background:'#FFF',border:'2px solid var(--border)',borderRadius:'14px',padding:'1rem',marginBottom:'1rem'}});

  const srcInp = inp({cn:'txt-inp',type:'text',placeholder:'Fuente (ej: Sueldo Eduardo, CicloMate...)',style:{marginBottom:'.7rem'}});
  form.appendChild(srcInp);

  const amtWrap = div({cn:'amt-wrap',style:{marginBottom:'.7rem'}});
  amtWrap.appendChild(div({cn:'amt-sign'},['$']));
  const amtInp = inp({cn:'amt-inp',type:'number',placeholder:'0'});
  amtWrap.appendChild(amtInp);
  form.appendChild(amtWrap);

  const today = new Date().toISOString().split('T')[0];
  const dateInp = inp({cn:'txt-inp',type:'date',value:today});

  const tc = div({cn:'two-col'});
  tc.appendChild(dateInp);
  const noteInp = inp({cn:'txt-inp',type:'text',placeholder:'Nota (opcional)'});
  tc.appendChild(noteInp);
  form.appendChild(tc);

  const addBtn = btn({cn:'save-btn',style:{marginTop:'.7rem'},onClick:() => {
    const src = srcInp.value.trim();
    const amt = Number(amtInp.value);
    if (!src || !amt) { srcInp.style.borderColor='#FF6B6B'; return; }
    srcInp.style.borderColor='';
    mdata().income.push({id:Date.now(), source:src, amount:amt, date:dateInp.value, note:noteInp.value.trim()});
    save();
    addBtn.textContent = '✓ Agregado';
    addBtn.classList.add('ok');
    setTimeout(() => { srcInp.value=''; amtInp.value=''; noteInp.value=''; addBtn.textContent='Agregar ingreso'; addBtn.classList.remove('ok'); render(); }, 700);
  }},['Agregar ingreso']);
  form.appendChild(addBtn);
  root.appendChild(form);

  // List
  const list = mdata().income.slice().sort((a,b) => b.date.localeCompare(a.date));
  if (!list.length) {
    root.appendChild(pe({cn:'empty'},['No hay ingresos registrados este mes.']));
    return;
  }

  const ul = div({cn:'inc-list'});
  list.forEach(inc => {
    const card = div({cn:'inc-card'});
    card.appendChild(el('span',{cn:'card-icon'},['💰']));
    const info = div({cn:'card-info'});
    info.appendChild(div({cn:'card-desc'},[inc.source]));
    info.appendChild(div({cn:'card-meta'},[inc.date + (inc.note ? ' · '+inc.note : '')]));
    card.appendChild(info);
    card.appendChild(div({cn:'card-amt',style:{color:'var(--green-dark)'}},['+'+fmt(inc.amount)]));
    card.appendChild(btn({cn:'del-x',onClick:() => {
      mdata().income = mdata().income.filter(x => x.id !== inc.id);
      save(); render();
    }},['✕']));
    ul.appendChild(card);
  });
  root.appendChild(ul);
}

function getWeekBounds(referenceDate, startDayName) {
  const DAY_MAP = {Lunes:1,Martes:2,'Miércoles':3,Jueves:4,Viernes:5,Sábado:6,Domingo:0};
  const startDay = DAY_MAP[startDayName] !== undefined ? DAY_MAP[startDayName] : 1;
  const d = new Date(referenceDate);
  const dow = d.getDay();
  let diff = (dow - startDay + 7) % 7;
  const mon = new Date(d); mon.setDate(d.getDate()-diff); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return {mon, sun};
}

function buildWeekHistory(cat) {
  const wrap = document.createElement('div');
  const now = new Date();
  const startDay = cat.weekStart || 'Lunes';
  const weeks = [];
  for (let w=4; w>=0; w--) {
    const ref = new Date(now); ref.setDate(now.getDate()-w*7);
    const {mon, sun} = getWeekBounds(ref, startDay);
    const mds = mon.toISOString().split('T')[0];
    const sds = sun.toISOString().split('T')[0];
    const mk2 = mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0');
    const monthData = S.data.months[mk2]||{income:[],expenses:[]};
    const spent = (monthData.expenses||[]).filter(e=>e.category===cat.id&&e.date>=mds&&e.date<=sds).reduce((s,e)=>s+e.amount,0);
    const today = now.toISOString().split('T')[0];
    weeks.push({mds,sds,spent,isCurrent:today>=mds&&today<=sds});
  }

  let carry=0;
  weeks.forEach(w => {
    w.carryIn = carry;
    w.effective = cat.budget + carry;
    w.remaining = w.effective - w.spent;
    carry = w.remaining;
  });

  weeks.forEach(w => {
    const pct = Math.min(100,(w.spent/Math.max(w.effective,1))*100);
    const over = w.remaining<0;

    const card = document.createElement('div');
    card.className = 'week-card'+(w.isCurrent?' current':'');

    const hdr = document.createElement('div'); hdr.className='week-hdr';
    const tl = document.createElement('div'); tl.className='week-title';
    tl.textContent = w.isCurrent ? 'Esta semana ('+w.mds.slice(5)+' → '+w.sds.slice(5)+')' : w.mds.slice(5)+' → '+w.sds.slice(5);
    const badge = document.createElement('div');
    badge.className = 'week-badge '+(over?'week-deficit':w.remaining>0?'week-surplus':'week-neutral');
    badge.textContent = (over?'–':'+')+fmt(Math.abs(w.remaining));
    hdr.appendChild(tl); hdr.appendChild(badge);
    card.appendChild(hdr);

    if (w.carryIn !== 0) {
      const ci = document.createElement('div'); ci.className='sub'; ci.style.cssText='margin-bottom:.3rem;font-size:.68rem';
      ci.textContent = 'Arrastre: '+(w.carryIn>0?'+':'')+fmt(w.carryIn);
      card.appendChild(ci);
    }

    const track = document.createElement('div'); track.className='week-bar-wrap';
    const fill  = document.createElement('div'); fill.className='week-bar-fill';
    fill.style.cssText = 'width:'+pct+'%;background:'+(over?'#FF6B6B':cat.color);
    track.appendChild(fill); card.appendChild(track);

    const det = document.createElement('div'); det.className='week-detail';
    const d1=document.createElement('span'); d1.textContent='Gastado: '+fmt(w.spent);
    const d2=document.createElement('span'); d2.textContent='Presupuesto: '+fmt(w.effective);
    det.appendChild(d1); det.appendChild(d2);
    card.appendChild(det);

    wrap.appendChild(card);
  });
  return wrap;
}

      db.className='chip'+((cat.weekStart||'Lunes')===day?' on':'');
      db.style.cssText='font-size:.7rem;padding:.25rem .6rem;min-height:30px';
      db.textContent=day;
      db.addEventListener('click',()=>{
        S.data.cats[i].weekStart=day;
        weekRow.querySelectorAll('.chip').forEach((b,bi)=>b.className='chip'+(DAYS_ES[bi]===day?' on':''));
      });
      weekRow.appendChild(db);
    });
    wrapper.appendChild(weekRow);

    // Sub-items
    const subList = document.createElement('div'); subList.className='subitem-list';
    function renderSubs() {
      subList.innerHTML='';
      (S.data.cats[i].subitems||[]).forEach((sub,j)=>{
        const sr = document.createElement('div'); sr.className='subitem-row';
        const sni=document.createElement('input'); sni.className='subitem-name'; sni.type='text'; sni.placeholder='Ej: Terapeuta...'; sni.value=sub.name;
        sni.addEventListener('input',e=>S.data.cats[i].subitems[j].name=e.target.value);
        const sai=document.createElement('input'); sai.className='subitem-amt'; sai.type='number'; sai.placeholder='$0'; sai.value=sub.budget||'';
        sai.addEventListener('input',e=>{
          S.data.cats[i].subitems[j].budget=Number(e.target.value);
          const tot=S.data.cats[i].subitems.reduce((s,x)=>s+(x.budget||0),0);
          if(tot>0){S.data.cats[i].budget=tot;bInp.value=tot;}
        });
        const sdel=document.createElement('button'); sdel.className='subitem-del'; sdel.textContent='✕';
        sdel.addEventListener('click',()=>{S.data.cats[i].subitems.splice(j,1);renderSubs();});
        sr.appendChild(sni);sr.appendChild(sai);sr.appendChild(sdel);
        subList.appendChild(sr);
      });
    }
    renderSubs();
    wrapper.appendChild(subList);
    catSec.appendChild(wrapper);
  });

  // Add category
  const addCatBtn = document.createElement('button');
  addCatBtn.className='ghost-btn'; addCatBtn.style.cssText='width:100%;margin-top:.5rem;margin-bottom:.5rem';
  addCatBtn.textContent='+ Agregar categoría';
  addCatBtn.addEventListener('click',()=>{
    const palette=CAT_PALETTES[S.data.cats.length%CAT_PALETTES.length];
    S.data.cats.push({id:'cat_'+Date.now(),name:'Nueva',icon:'✨',color:palette.color,bg:palette.bg,freq:'mensual',budget:0,weekStart:'Lunes',subitems:[]});
    render();
  });
  catSec.appendChild(addCatBtn);
  root.appendChild(catSec);

  // Save
  const saveCatBtn = document.createElement('button');
  saveCatBtn.className='save-btn'; saveCatBtn.textContent='Guardar cambios';
  saveCatBtn.addEventListener('click',()=>{
    save();
    saveCatBtn.textContent='✓ ¡Guardado!'; saveCatBtn.classList.add('ok');
    setTimeout(()=>{ saveCatBtn.textContent='Guardar cambios'; saveCatBtn.classList.remove('ok'); },1500);
  });
  root.appendChild(saveCatBtn);

  // Export/Import
  const expSec = div({cn:'set-sec',style:{marginTop:'1.4rem'}});
  expSec.appendChild(div({cn:'set-sec-title'},['💾 Respaldo']));
  const btnRow2 = document.createElement('div'); btnRow2.style.cssText='display:flex;gap:.7rem';

  const expBtn = document.createElement('button'); expBtn.className='ghost-btn'; expBtn.style.flex='1';
  expBtn.textContent='📤 Exportar JSON';
  expBtn.addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(S.data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='mis_finanzas_backup.json';a.click();
    URL.revokeObjectURL(url);
  });

  const fileInp2 = document.createElement('input'); fileInp2.type='file'; fileInp2.accept='.json'; fileInp2.style.display='none';
  fileInp2.addEventListener('change',async e=>{
    const file=e.target.files[0];if(!file)return;
    const text=await file.text();
    try{S.data=JSON.parse(text);save();alert('✓ Datos importados');render();}
    catch{alert('Error: archivo no válido');}
  });
  const impBtn = document.createElement('button'); impBtn.className='ghost-btn'; impBtn.style.flex='1';
  impBtn.textContent='📥 Importar JSON';
  impBtn.addEventListener('click',()=>fileInp2.click());

  btnRow2.appendChild(expBtn); btnRow2.appendChild(fileInp2); btnRow2.appendChild(impBtn);
  expSec.appendChild(btnRow2);
  root.appendChild(expSec);
}

// ═══════════════════════════════════════════════
// PROJECTED VIEW
// ═══════════════════════════════════════════════
function rProjected(c) {
  const root = div({cn:'view'});
  c.appendChild(root);

  const hdr = div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.5rem'}});
  hdr.appendChild(h2e({cn:'page-title',style:{margin:'0'}},['Proyectados']));
  const togBtn = document.createElement('button');
  togBtn.className='pill-btn'; togBtn.textContent=S.projForm?'✕ Cerrar':'+ Nuevo';
  togBtn.addEventListener('click',()=>{ S.projForm=!S.projForm; render(); });
  hdr.appendChild(togBtn);
  root.appendChild(hdr);
  root.appendChild(pe({cn:'sub',style:{marginBottom:'1rem'}},['Planificá gastos futuros. Cuando llegue el mes, aparece una alerta en Inicio.']));

  const cms = mk();

  if (S.projForm) {
    const form = document.createElement('div');
    form.style.cssText='background:#FFF;border:2px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:1rem';

    const ni = inp({cn:'txt-inp',type:'text',placeholder:'Zapatillas, dentista, crema...',style:{marginBottom:'.7rem'}});
    form.appendChild(ni);

    const aw = div({cn:'amt-wrap',style:{marginBottom:'.7rem'}});
    aw.appendChild(div({cn:'amt-sign'},['$']));
    const ai = inp({cn:'amt-inp',type:'number',placeholder:'0'});
    aw.appendChild(ai); form.appendChild(aw);

    // Month/year picker
    const today2 = new Date();
    const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    let selYear = today2.getFullYear();
    let selMonth = today2.getMonth();

    const dateLbl = document.createElement('label');
    dateLbl.className='flbl'; dateLbl.style.marginBottom='.4rem'; dateLbl.textContent='¿Para cuándo?';
    form.appendChild(dateLbl);

    const yearRow = document.createElement('div');
    yearRow.style.cssText='display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem';
    const yb = document.createElement('button'); yb.className='arrbtn'; yb.style.cssText='width:32px;height:32px;min-height:32px;font-size:.9rem'; yb.textContent='←';
    const yl = document.createElement('span'); yl.style.cssText="font-family:'Lora',serif;font-weight:700;font-size:1rem;flex:1;text-align:center"; yl.textContent=String(selYear);
    const yf = document.createElement('button'); yf.className='arrbtn'; yf.style.cssText='width:32px;height:32px;min-height:32px;font-size:.9rem'; yf.textContent='→';
    yb.addEventListener('click',()=>{ selYear--; yl.textContent=String(selYear); });
    yf.addEventListener('click',()=>{ selYear++; yl.textContent=String(selYear); });
    yearRow.appendChild(yb); yearRow.appendChild(yl); yearRow.appendChild(yf);
    form.appendChild(yearRow);

    const mGrid = document.createElement('div');
    mGrid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:.3rem;margin-bottom:.9rem';
    const mBtns=[];
    MONTHS_SHORT.forEach((m,idx2)=>{
      const mb=document.createElement('button');
      mb.className='chip'+(idx2===selMonth?' on':'');
      mb.style.cssText='font-size:.78rem;padding:.35rem .2rem;min-height:34px';
      mb.textContent=m;
      mb.addEventListener('click',()=>{ selMonth=idx2; mBtns.forEach((b,k)=>b.className='chip'+(k===selMonth?' on':'')); });
      mBtns.push(mb); mGrid.appendChild(mb);
    });
    form.appendChild(mGrid);

    const addBtn = document.createElement('button');
    addBtn.className='save-btn'; addBtn.textContent='Agregar';
    addBtn.addEventListener('click',()=>{
      const name=ni.value.trim(); const amt=Number(ai.value);
      if(!name||!amt) return;
      const target=selYear+'-'+String(selMonth+1).padStart(2,'0');
      S.data.projected.push({id:Date.now(),name,amount:amt,targetMonth:target,done:false});
      save(); S.projForm=false; render();
    });
    form.appendChild(addBtn);
    root.appendChild(form);
  }

  const sorted=S.data.projected.slice().sort((a,b)=>a.targetMonth.localeCompare(b.targetMonth));
  if(!sorted.length) root.appendChild(pe({cn:'empty'},['Nada proyectado aún. ¡Agregá algo!']));

  sorted.forEach(p=>{
    const isNow=p.targetMonth===cms, isPast=p.targetMonth<cms;
    const card=document.createElement('div');
    card.className='proj-card'+(p.done?' past':isNow?' now':'');

    const top=document.createElement('div'); top.className='proj-top';
    const pn=document.createElement('span'); pn.style.cssText='font-size:.9rem;font-weight:700;color:var(--text)';
    pn.style.textDecoration=p.done?'line-through':'none'; pn.textContent=p.name;
    const pa=document.createElement('span'); pa.style.cssText="font-family:'Lora',serif;font-weight:700"; pa.textContent=fmt(p.amount);
    top.appendChild(pn); top.appendChild(pa); card.appendChild(top);

    const tag=document.createElement('div');
    tag.className='ptag '+(p.done?'done':isNow?'now':!isPast?'future':'done');
    tag.textContent=p.done?'✓ Ejecutado':isNow?'⚠️ Este mes':!isPast?'📅 '+p.targetMonth:'Pasado';
    card.appendChild(tag);

    const btns=document.createElement('div'); btns.className='proj-btns';
    const bd=document.createElement('button'); bd.className='pb g';
    bd.textContent=p.done?'↩ Deshacer':'✓ Hecho';
    bd.addEventListener('click',()=>{ S.data.projected=S.data.projected.map(x=>x.id===p.id?{...x,done:!x.done}:x); save();render(); });
    const br=document.createElement('button'); br.className='pb r'; br.textContent='🗑 Eliminar';
    br.addEventListener('click',()=>{ S.data.projected=S.data.projected.filter(x=>x.id!==p.id); save();render(); });
    btns.appendChild(bd); btns.appendChild(br); card.appendChild(btns);
    root.appendChild(card);
  });
}

// ═══════════════════════════════════════════════
// FONDOS VIEW
// ═══════════════════════════════════════════════
function rFondos(c) {
  const root = div({cn:'view'});
  c.appendChild(root);
  if (!S.data.fondos) S.data.fondos = [
    {id:'f1', name:'Fondo Proyectados', icon:'🔮', color:'#C9A0DC', meta:0, aportes:[], retiros:[]},
    {id:'f2', name:'Fondo Verano',      icon:'☀️', color:'#FFB347', meta:0, aportes:[], retiros:[]},
    {id:'f3', name:'Fondo Ahorro',      icon:'🏦', color:'#77DD77', meta:0, aportes:[], retiros:[]},
  ];

  const totalGlobal = S.data.fondos.reduce((s,f)=>{
    return s + (f.aportes||[]).reduce((a,ap)=>a+ap.amount,0) - (f.retiros||[]).reduce((a,r)=>a+r.amount,0);
  },0);

  // Global summary
  const gbl = div({cn:'fondos-global'});
  gbl.addEventListener('click',()=>{});
  const gi = document.createElement('span'); gi.style.fontSize='2rem'; gi.textContent='🏦';
  const ginfo = document.createElement('div'); ginfo.style.flex='1';
  const gl = document.createElement('div'); gl.style.cssText='font-size:.68rem;font-weight:800;color:#5A4A6A;text-transform:uppercase;letter-spacing:.8px'; gl.textContent='Total en fondos';
  const gv = document.createElement('div'); gv.style.cssText="font-family:'Lora',serif;font-size:1.8rem;font-weight:700;color:#3A3040"; gv.textContent=fmt(totalGlobal);
  ginfo.appendChild(gl); ginfo.appendChild(gv);
  gbl.appendChild(gi); gbl.appendChild(ginfo);
  root.appendChild(gbl);

  // Each fondo
  S.data.fondos.forEach((f,fi) => {
    const aportesTotal = (f.aportes||[]).reduce((s,a)=>s+a.amount,0);
    const retirosTotal = (f.retiros||[]).reduce((s,r)=>s+r.amount,0);
    const saldo = aportesTotal - retirosTotal;
    const pct = f.meta>0 ? Math.min(100,(saldo/f.meta)*100) : 0;

    const card = div({cn:'fondo-card'});

    // Header
    const hdr = div({cn:'fondo-header'});
    const nm = document.createElement('span'); nm.className='fondo-name'; nm.textContent=f.icon+' '+f.name;
    const tot = document.createElement('span'); tot.className='fondo-total'; tot.style.color=f.color; tot.textContent=fmt(saldo);
    hdr.appendChild(nm); hdr.appendChild(tot);
    card.appendChild(hdr);

    // Meta
    if(f.meta>0){
      const mp = document.createElement('div'); mp.className='fondo-meta';
      mp.textContent='Meta: '+fmt(f.meta)+' · '+Math.round(pct)+'% alcanzado';
      card.appendChild(mp);
      const track = div({cn:'fondo-track'},[div({cn:'fondo-fill',style:{width:pct+'%',background:f.color}})]);
      card.appendChild(track);
    }

    // History toggle
    const hist = div({cn:'fondo-history'});
    const allMovs = [
      ...(f.aportes||[]).map(a=>({...a,tipo:'aporte'})),
      ...(f.retiros||[]).map(r=>({...r,tipo:'retiro'}))
    ].sort((a,b)=>b.date.localeCompare(a.date));

    if(allMovs.length){
      allMovs.forEach(mov=>{
        const row = div({cn:'fondo-hist-row'});
        const ld = document.createElement('span'); ld.textContent=(mov.tipo==='aporte'?'↑ ':'↓ ')+(mov.note||mov.date);
        const la = document.createElement('span'); la.style.fontWeight='800';
        la.style.color=mov.tipo==='aporte'?'#2A7050':'#A03030';
        la.textContent=(mov.tipo==='aporte'?'+':'-')+fmt(mov.amount)+' · '+mov.date;
        row.appendChild(ld); row.appendChild(la);
        hist.appendChild(row);
      });
    } else {
      const em = document.createElement('p'); em.className='empty'; em.style.padding='.5rem 0'; em.textContent='Sin movimientos aún.';
      hist.appendChild(em);
    }

    // Aporte form inside history
    const af = div({cn:'fondo-add-form'});
    const afRow = document.createElement('div'); afRow.style.cssText='display:flex;gap:.5rem;margin-bottom:.5rem';
    const afAmt = inp({cn:'txt-inp',type:'number',placeholder:'Monto a aportar',style:{flex:'1'}});
    const afNote = inp({cn:'txt-inp',type:'text',placeholder:'Nota (opcional)',style:{flex:'1'}});
    afRow.appendChild(afAmt); afRow.appendChild(afNote); af.appendChild(afRow);

    const afBtnRow = document.createElement('div'); afBtnRow.style.cssText='display:flex;gap:.5rem';
    const afAdd = document.createElement('button'); afAdd.className='save-btn'; afAdd.style.cssText='flex:1;padding:.6rem'; afAdd.textContent='＋ Aportar';
    afAdd.addEventListener('click',()=>{
      const amt=Number(afAmt.value); if(!amt) return;
      if(!S.data.fondos[fi].aportes) S.data.fondos[fi].aportes=[];
      S.data.fondos[fi].aportes.push({id:Date.now(),amount:amt,date:new Date().toISOString().split('T')[0],note:afNote.value.trim()});
      save(); render();
    });
    const afRet = document.createElement('button'); afRet.className='ghost-btn'; afRet.style.cssText='flex:1;padding:.6rem'; afRet.textContent='↓ Retirar';
    afRet.addEventListener('click',()=>{
      const amt=Number(afAmt.value); if(!amt) return;
      if(!S.data.fondos[fi].retiros) S.data.fondos[fi].retiros=[];
      S.data.fondos[fi].retiros.push({id:Date.now(),amount:amt,date:new Date().toISOString().split('T')[0],note:afNote.value.trim()});
      save(); render();
    });
    afBtnRow.appendChild(afAdd); afBtnRow.appendChild(afRet); af.appendChild(afBtnRow);
    hist.appendChild(af);
    card.appendChild(hist);

    // Toggle click
    card.addEventListener('click',()=>{
      hist.classList.toggle('open');
    });

    root.appendChild(card);
  });

  // Add fondo button
  const addFondoBtn = document.createElement('button');
  addFondoBtn.className='ghost-btn'; addFondoBtn.style.cssText='width:100%;margin-top:.5rem';
  addFondoBtn.textContent='+ Crear nuevo fondo';
  addFondoBtn.addEventListener('click',()=>{
    const name=prompt('Nombre del fondo:'); if(!name) return;
    const meta=Number(prompt('Meta en pesos (0 si no tenés meta):')||0);
    const icons=['💡','🎯','🌟','💎','🚀','🏖️','🎓','🏥'];
    const colors=['#FF9AA2','#87CEEB','#B5EAD7','#FDFD96','#C9A0DC','#FFB347','#7EC8C8','#AEC6CF'];
    const idx2=S.data.fondos.length%icons.length;
    S.data.fondos.push({id:'f_'+Date.now(),name,icon:icons[idx2],color:colors[idx2],meta,aportes:[],retiros:[]});
    save(); render();
  });
  root.appendChild(addFondoBtn);
}

    n.addEventListener('click', () => go(n.dataset.view));
